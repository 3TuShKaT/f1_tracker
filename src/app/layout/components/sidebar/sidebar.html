<aside class="sticky top-0 flex h-screen w-64 flex-col border-r border-white/10 bg-[#0d1118] px-6 py-6 text-white">
  <div class="mb-10 flex items-center gap-3">
    <img
      src="/logo/F1-Logo.png"
      alt="F1 logo"
      class="h-auto w-20"
    />
  </div>

  <nav class="flex flex-1 flex-col gap-2">
    <a
      routerLink="/"
      routerLinkActive="bg-gradient-to-r from-[#e10600] to-[#5a0a0a] text-white shadow-[0_0_24px_rgba(225,6,0,0.18)]"
      [routerLinkActiveOptions]="{ exact: true }"
      class="group flex items-center gap-4 rounded-xl px-4 py-3 text-zinc-400 transition hover:bg-white/5 hover:text-white"
    >
      <ng-icon name="tablerLayoutDashboard" class="text-[22px]" />
      <span>Dashboard</span>
    </a>

    <a
      routerLink="/races"
      routerLinkActive="bg-gradient-to-r from-[#e10600] to-[#5a0a0a] text-white shadow-[0_0_24px_rgba(225,6,0,0.18)]"
      class="group flex items-center gap-4 rounded-xl px-4 py-3 text-zinc-400 transition hover:bg-white/5 hover:text-white"
    >
      <ng-icon name="tablerCalendar" class="text-[22px]" />
      <span>Calendar</span>
    </a>

    <a
      routerLink="/standings"
      routerLinkActive="bg-gradient-to-r from-[#e10600] to-[#5a0a0a] text-white shadow-[0_0_24px_rgba(225,6,0,0.18)]"
      class="group flex items-center gap-4 rounded-xl px-4 py-3 text-zinc-400 transition hover:bg-white/5 hover:text-white"
    >
      <ng-icon name="tablerTrophy" class="text-[22px]" />
      <span>Standings</span>
    </a>

    <a
      routerLink="/results"
      routerLinkActive="bg-gradient-to-r from-[#e10600] to-[#5a0a0a] text-white shadow-[0_0_24px_rgba(225,6,0,0.18)]"
      class="group flex items-center gap-4 rounded-xl px-4 py-3 text-zinc-400 transition hover:bg-white/5 hover:text-white"
    >
      <ng-icon name="bootstrapFlag" class="text-[22px]" />
      <span>Results</span>
    </a>

    <a
      routerLink="/drivers"
      routerLinkActive="bg-gradient-to-r from-[#e10600] to-[#5a0a0a] text-white shadow-[0_0_24px_rgba(225,6,0,0.18)]"
      class="group flex items-center gap-4 rounded-xl px-4 py-3 text-zinc-400 transition hover:bg-white/5 hover:text-white"
    >
      <ng-icon name="tablerHelmet" class="text-[22px]" />
      <span>Drivers</span>
    </a>

    <a
      routerLink="/teams"
      routerLinkActive="bg-gradient-to-r from-[#e10600] to-[#5a0a0a] text-white shadow-[0_0_24px_rgba(225,6,0,0.18)]"
      class="group flex items-center gap-4 rounded-xl px-4 py-3 text-zinc-400 transition hover:bg-white/5 hover:text-white"
    >
      <ng-icon name="tablerUsersGroup" class="text-[22px]" />
      <span>Teams</span>
    </a>

    <a
      routerLink="/circuits"
      routerLinkActive="bg-gradient-to-r from-[#e10600] to-[#5a0a0a] text-white shadow-[0_0_24px_rgba(225,6,0,0.18)]"
      class="group flex items-center gap-4 rounded-xl px-4 py-3 text-zinc-400 transition hover:bg-white/5 hover:text-white"
    >
      <ng-icon name="tablerRoute" class="text-[22px]" />
      <span>Circuits</span>
    </a>

    <a
      routerLink="/statistics"
      routerLinkActive="bg-gradient-to-r from-[#e10600] to-[#5a0a0a] text-white shadow-[0_0_24px_rgba(225,6,0,0.18)]"
      class="group flex items-center gap-4 rounded-xl px-4 py-3 text-zinc-400 transition hover:bg-white/5 hover:text-white"
    >
      <ng-icon name="tablerChartBar" class="text-[22px]" />
      <span>Statistics</span>
    </a>

    <a
      routerLink="/about"
      routerLinkActive="bg-gradient-to-r from-[#e10600] to-[#5a0a0a] text-white shadow-[0_0_24px_rgba(225,6,0,0.18)]"
      class="group flex items-center gap-4 rounded-xl px-4 py-3 text-zinc-400 transition hover:bg-white/5 hover:text-white"
    >
      <ng-icon name="tablerInfoCircle" class="text-[22px]" />
      <span>About</span>
    </a>
  </nav>

  <div class="mt-auto rounded-2xl border border-white/10 bg-white/[0.03] p-4">
    <p class="text-sm text-zinc-400">Season</p>

    <button class="mt-1 flex w-full items-center justify-between text-left">
      <span class="text-2xl font-bold text-white">2026</span>
      <span class="text-zinc-400">⌄</span>
    </button>
  </div>

  <div class="mt-6 text-center text-xs text-zinc-500">
    <p>Powered by</p>
    <p class="mt-1 font-semibold text-[#e10600]">Jolpica-f1 API</p>
  </div>
</aside>
